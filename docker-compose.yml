services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: solomon
      POSTGRES_PASSWORD: solomon
      POSTGRES_DB: solomon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solomon"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://solomon:solomon@db:5432/solomon?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
